<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB Detail — Alexandrian Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-50: #eef2ff; --primary-100: #e0e7ff;
      --primary-600: #4338ca; --primary-700: #3730a3;
      --success: #059669; --success-50: #ecfdf5;
      --warning: #d97706; --warning-50: #fffbeb;
      --danger: #dc2626; --danger-50: #fef2f2;
      --info: #0284c7; --info-50: #e0f2fe;
      --purple: #7c3aed; --purple-50: #f5f3ff;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
      --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    }
    html { font-size: 16px; }
    body { font-family: var(--font-sans); background: var(--gray-50); color: var(--gray-900); line-height: 1.5; min-height: 100vh; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    .site-header { background: #fff; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 50; }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 24px; }
    .wordmark { font-weight: 700; font-size: 1.0625rem; letter-spacing: -.02em; }
    .wordmark span { color: var(--primary); }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: .875rem; font-weight: 500; color: var(--gray-600); }
    .nav-links a:hover { color: var(--gray-900); text-decoration: none; }
    .header-spacer { flex: 1; }
    .header-badge { font-size: .75rem; font-weight: 600; background: var(--success-50); color: var(--success); border: 1px solid #a7f3d0; padding: 3px 10px; border-radius: 99px; }

    /* Page body */
    .page-body { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

    /* Breadcrumb */
    .breadcrumb { font-size: .875rem; color: var(--gray-500); margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
    .breadcrumb a { color: var(--gray-500); }
    .breadcrumb a:hover { color: var(--primary); }
    .bc-sep { color: var(--gray-300); }

    /* KB hero */
    .kb-hero { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 28px 32px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .kb-hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .kb-title { font-size: 1.375rem; font-weight: 700; letter-spacing: -.02em; color: var(--gray-900); }
    .kb-domain { font-family: var(--font-mono); font-size: .8125rem; color: var(--primary); margin-top: 4px; }
    .hero-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn { display: inline-flex; align-items: center; gap: 6px; font-size: .8125rem; font-weight: 600; padding: 8px 14px; border-radius: var(--radius-md); text-decoration: none; transition: all .15s; border: 1px solid transparent; }
    .action-btn-primary { background: var(--primary); color: #fff; }
    .action-btn-primary:hover { background: var(--primary-600); text-decoration: none; }
    .action-btn-outline { background: #fff; color: var(--gray-700); border-color: var(--gray-300); }
    .action-btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-50); text-decoration: none; }

    .hero-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400); }
    .meta-value { font-size: .875rem; font-weight: 500; color: var(--gray-800); }

    /* Badges */
    .badge { display: inline-flex; align-items: center; font-size: .6875rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
    .badge-practice   { background: var(--primary-50); color: var(--primary-700); }
    .badge-feature    { background: #dbeafe; color: #1d4ed8; }
    .badge-compliance { background: var(--danger-50); color: #b91c1c; }
    .badge-rubric     { background: var(--purple-50); color: #6d28d9; }
    .badge-state      { background: #fce7f3; color: #9d174d; }
    .badge-prompt     { background: var(--success-50); color: #065f46; }
    .badge-unknown    { background: var(--gray-100); color: var(--gray-600); }
    .tier-human       { background: var(--success-50); color: #065f46; }
    .tier-agent       { background: var(--warning-50); color: #92400e; }
    .tier-discover    { background: var(--info-50); color: #0c4a6e; }

    /* Reputation bar */
    .rep-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .rep-bar-bg { flex: 1; height: 6px; background: var(--gray-200); border-radius: 99px; max-width: 100px; }
    .rep-bar-fill { height: 100%; border-radius: 99px; background: var(--primary); }
    .rep-value { font-size: .8125rem; font-weight: 600; color: var(--primary); }

    /* Section cards */
    .section-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .section-header { display: flex; align-items: center; gap: 10px; padding: 16px 24px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); }
    .section-title { font-size: .9375rem; font-weight: 600; color: var(--gray-800); }
    .section-count { font-size: .8125rem; font-weight: 600; background: var(--primary-50); color: var(--primary); padding: 1px 8px; border-radius: 99px; }
    .section-body { padding: 20px 24px; }

    /* Steps */
    .step-list { display: flex; flex-direction: column; gap: 12px; }
    .step-item { display: flex; gap: 14px; }
    .step-num { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--primary-50); color: var(--primary); font-size: .8125rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
    .step-content { flex: 1; }
    .step-action { font-size: .9375rem; color: var(--gray-800); line-height: 1.5; }
    .step-rationale { font-size: .8125rem; color: var(--gray-500); margin-top: 4px; line-height: 1.6; }

    /* Checklist */
    .checklist-list { display: flex; flex-direction: column; gap: 16px; }
    .checklist-item { border-left: 3px solid var(--gray-200); padding-left: 14px; }
    .checklist-item.sev-critical { border-left-color: var(--danger); }
    .checklist-item.sev-high     { border-left-color: var(--warning); }
    .checklist-item.sev-medium   { border-left-color: var(--success); }
    .severity-pill { font-size: .625rem; font-weight: 700; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; }
    .pill-critical { background: var(--danger-50); color: var(--danger); }
    .pill-high     { background: var(--warning-50); color: var(--warning); }
    .pill-medium   { background: var(--success-50); color: var(--success); }
    .checklist-text { font-size: .9375rem; color: var(--gray-800); margin-top: 4px; line-height: 1.5; }
    .checklist-rationale { font-size: .8125rem; color: var(--gray-500); margin-top: 4px; line-height: 1.6; }

    /* Parents */
    .parents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .parent-card { border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 14px 16px; transition: all .12s; }
    .parent-card:hover { border-color: var(--primary-100); background: var(--primary-50); }
    .parent-hash { font-family: var(--font-mono); font-size: .75rem; color: var(--gray-500); }
    .parent-royalty { font-size: .75rem; font-weight: 600; color: var(--success); margin-top: 6px; }
    .parent-link { font-size: .75rem; color: var(--primary); margin-top: 6px; display: inline-block; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 20px 24px; }
    .stat-box { text-align: center; }
    .stat-number { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); letter-spacing: -.02em; }
    .stat-desc { font-size: .75rem; color: var(--gray-500); margin-top: 2px; }

    /* Provenance table */
    .prov-table { width: 100%; border-collapse: collapse; }
    .prov-table tr:not(:last-child) { border-bottom: 1px solid var(--gray-100); }
    .prov-table td { padding: 10px 0; vertical-align: top; }
    .prov-key { font-size: .8125rem; font-weight: 500; color: var(--gray-500); width: 160px; padding-right: 16px; white-space: nowrap; }
    .prov-val { font-size: .8125rem; color: var(--gray-800); word-break: break-all; }
    .prov-val-mono { font-family: var(--font-mono); font-size: .75rem; color: var(--gray-800); word-break: break-all; }

    /* State cards */
    .state-card { text-align: center; padding: 64px 24px; }
    .state-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .state-title { font-size: 1.0625rem; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
    .state-sub { font-size: .875rem; color: var(--gray-500); max-width: 400px; margin: 0 auto; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .label-text { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400); margin-bottom: 12px; display: block; }

    .footer { background: #fff; border-top: 1px solid var(--gray-200); padding: 20px 24px; text-align: center; font-size: .8125rem; color: var(--gray-400); }
    .footer a { color: var(--gray-500); }

    @media (max-width: 640px) { .kb-hero { padding: 20px; } .section-body { padding: 16px; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="wordmark">Alexandrian<span>.</span></span>
      <nav class="nav-links">
        <a href="/demo/kb-eng.html">Query</a>
        <a href="/registry">Registry</a>
      </nav>
      <div class="header-spacer"></div>
      <span class="header-badge">Base Mainnet</span>
    </div>
  </header>

  <div class="page-body">
    <div class="breadcrumb">
      <a href="/registry">Registry</a>
      <span class="bc-sep">›</span>
      <span id="bc-domain">Loading…</span>
    </div>
    <div id="page-content">
      <div class="state-card">
        <span class="spinner"></span>
        <p class="state-title">Loading knowledge base…</p>
        <p class="state-sub">Fetching from The Graph subgraph and IPFS</p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Alexandrian Protocol &mdash;
      <a href="https://github.com/alexandrianprotocol/alexandrian-protocol" target="_blank" rel="noopener">GitHub</a> &middot;
      <a href="https://basescan.org/address/0xD1F216E872a9ed4b90E364825869c2F377155B29" target="_blank" rel="noopener">Contract</a>
    </p>
  </footer>

  <script>
    'use strict';

    const SUBGRAPH = 'https://api.studio.thegraph.com/query/1742359/alexandrian-protocol/version/latest';
    const BASESCAN = 'https://basescan.org';
    const IPFS_GWS = ['https://ipfs.io/ipfs', 'https://cloudflare-ipfs.com/ipfs', 'https://gateway.pinata.cloud/ipfs'];

    // ── DOM builders — all content via textContent or setAttribute, never innerHTML for data ──
    function el(tag, opts) {
      const n = document.createElement(tag);
      if (opts) for (const [k, v] of Object.entries(opts)) {
        if (k === 'className') n.className = v;
        else if (k === 'textContent') n.textContent = v;
        else if (k === 'title') n.title = v;
        else if (k === 'style') n.style.cssText = v;
        else n.setAttribute(k, v);
      }
      return n;
    }
    function append(parent, ...kids) {
      for (const k of kids) { if (k) parent.appendChild(k instanceof Node ? k : document.createTextNode(String(k))); }
      return parent;
    }
    function clearEl(node) { while (node.firstChild) node.removeChild(node.firstChild); }

    // ── Type maps ─────────────────────────────────────────────────────────────
    const TYPE_CSS  = { 0:'badge-practice',1:'badge-feature',2:'badge-state',3:'badge-prompt',4:'badge-compliance',5:'badge-rubric' };
    const TYPE_TEXT = { 0:'Practice',1:'Feature',2:'State Machine',3:'Prompt Eng.',4:'Compliance',5:'Rubric' };
    const TIER_CSS  = { HumanStaked:'tier-human', AgentDerived:'tier-agent', AgentDiscovered:'tier-discover' };
    const TIER_TEXT = { HumanStaked:'Human Staked', AgentDerived:'Agent Derived', AgentDiscovered:'Agent Discovered' };

    function typeBadge(t) {
      const s = el('span', { className: `badge ${TYPE_CSS[t] || 'badge-unknown'}`, textContent: TYPE_TEXT[t] || String(t ?? '—') });
      return s;
    }
    function tierBadge(t) {
      return el('span', { className: `badge ${TIER_CSS[t] || 'badge-unknown'}`, textContent: TIER_TEXT[t] || String(t ?? '—') });
    }

    function trunc(h, pre=8, suf=6) { return h ? h.slice(0,pre)+'…'+h.slice(-suf) : '—'; }
    function weiToEth(wei) {
      if (!wei) return '0';
      return (Number(BigInt(wei)) / 1e18).toFixed(6).replace(/\.?0+$/, '');
    }

    // ── Subgraph ──────────────────────────────────────────────────────────────
    async function fetchKB(hash) {
      const q = `{
        knowledgeBases(where: { contentHash: "${hash}" }) {
          contentHash cid domain kbType trustTier
          queryFee stakeAmount isSlashed curator creator
          blockNumber timestamp transactionHash
          reputationScore queryVolume endorsementCount
          settlementCount totalSettledValue uniquePayerCount lastSettledAt
          childCount lineageDepth
          parents { parentHash royaltyShareBps }
        }
      }`;
      const res  = await fetch(SUBGRAPH, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q}) });
      if (!res.ok) throw new Error(`Subgraph ${res.status}`);
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0]?.message);
      const kbs = json.data?.knowledgeBases ?? [];
      if (!kbs.length) throw new Error('KB not found in subgraph');
      return kbs[0];
    }

    // ── IPFS ──────────────────────────────────────────────────────────────────
    async function fetchArtifact(cid) {
      for (const gw of IPFS_GWS) {
        try {
          const ctrl = new AbortController();
          const t    = setTimeout(() => ctrl.abort(), 7000);
          const res  = await fetch(`${gw}/${cid}`, { signal: ctrl.signal });
          clearTimeout(t);
          if (res.ok) return await res.json();
        } catch { /* next */ }
      }
      return null;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderPage(kb, artifact) {
      const pc = document.getElementById('page-content');
      clearEl(pc);
      document.getElementById('bc-domain').textContent = kb.domain || 'Unknown';

      const title = artifact?.title || kb.domain || 'Knowledge Base';
      document.title = `${title} — Alexandrian Protocol`;

      // ── Hero ──────────────────────────────────────────────────────────────
      const hero = el('div', { className: 'kb-hero' });
      const heroTop = el('div', { className: 'kb-hero-top' });

      const titleBlock = el('div');
      append(titleBlock,
        append(el('h1', { className: 'kb-title', textContent: title })),
        append(el('p',  { className: 'kb-domain', textContent: kb.domain || '' })),
      );
      heroTop.appendChild(titleBlock);

      const heroActions = el('div', { className: 'hero-actions' });
      if (kb.transactionHash) {
        heroActions.appendChild(append(el('a', { className:'action-btn action-btn-outline', href:`${BASESCAN}/tx/${kb.transactionHash}`, target:'_blank', rel:'noopener', textContent:'View on Basescan ↗' })));
      }
      if (kb.cid) {
        heroActions.appendChild(append(el('a', { className:'action-btn action-btn-outline', href:`${IPFS_GWS[0]}/${kb.cid}`, target:'_blank', rel:'noopener', textContent:'View Artifact ↗' })));
      }
      heroActions.appendChild(el('a', { className:'action-btn action-btn-primary', href:'/demo/kb-eng.html', textContent:'⚡ Query Playground' }));
      heroTop.appendChild(heroActions);
      hero.appendChild(heroTop);

      // Meta grid
      const meta = el('div', { className: 'hero-meta' });

      function metaItem(labelText, valueNode) {
        const d = el('div', { className: 'meta-item' });
        append(d, el('span', { className:'meta-label', textContent: labelText }));
        if (valueNode instanceof Node) d.appendChild(valueNode);
        else append(d, el('span', { className:'meta-value', textContent: String(valueNode ?? '—') }));
        return d;
      }

      meta.appendChild(metaItem('Type', typeBadge(kb.kbType)));
      meta.appendChild(metaItem('Trust Tier', tierBadge(kb.trustTier)));

      // Reputation bar
      const repScore = kb.reputationScore ?? 0;
      const repItem  = el('div', { className: 'meta-item' });
      append(repItem, el('span', { className:'meta-label', textContent:'Reputation' }));
      const repRow = el('div', { className:'rep-bar-wrap' });
      const barBg  = el('div', { className:'rep-bar-bg' });
      const barFill = el('div', { className:'rep-bar-fill', style:`width:${repScore/10}%` });
      barBg.appendChild(barFill);
      append(repRow, barBg, el('span', { className:'rep-value', textContent:`${repScore}/1000` }));
      repItem.appendChild(repRow);
      meta.appendChild(repItem);

      meta.appendChild(metaItem('Query Volume',  String(kb.queryVolume ?? 0)));
      meta.appendChild(metaItem('Settlements',   String(kb.settlementCount ?? 0)));
      meta.appendChild(metaItem('Total Earned',  `${weiToEth(kb.totalSettledValue)} ETH`));
      meta.appendChild(metaItem('Lineage Depth', String(kb.lineageDepth ?? 0)));
      meta.appendChild(metaItem('Children',      String(kb.childCount ?? 0)));

      hero.appendChild(meta);
      pc.appendChild(hero);

      // ── Artifact content ──────────────────────────────────────────────────
      const contentCard = el('div', { className:'section-card' });
      append(contentCard, append(el('div', { className:'section-header' }),
        el('span', { className:'section-title', textContent:'Artifact Content' }),
      ));
      const contentBody = el('div', { className:'section-body' });

      if (!artifact) {
        append(contentBody, el('p', { style:'color:var(--gray-500);font-size:.875rem;', textContent: `Artifact unavailable (CID: ${kb.cid || 'none'})` }));
      } else {
        if (artifact.summary) {
          append(contentBody, el('p', { style:'font-size:.9375rem;color:var(--gray-600);line-height:1.7;margin-bottom:16px;', textContent: artifact.summary }));
        }

        if (Array.isArray(artifact.steps) && artifact.steps.length) {
          append(contentBody, el('span', { className:'label-text', textContent:`Procedure — ${artifact.steps.length} steps` }));
          const list = el('div', { className:'step-list' });
          artifact.steps.forEach((step, i) => {
            const action    = typeof step === 'string' ? step : (step.action || step.id || '');
            const rationale = typeof step === 'object' ? (step.rationale || '') : '';
            const item = el('div', { className:'step-item' });
            append(item,
              el('span', { className:'step-num', textContent: String(i+1) }),
              append(el('div', { className:'step-content' }),
                el('p', { className:'step-action', textContent: action }),
                rationale ? el('p', { className:'step-rationale', textContent: rationale }) : null,
              ),
            );
            list.appendChild(item);
          });
          contentBody.appendChild(list);
        }

        if (Array.isArray(artifact.checklist) && artifact.checklist.length) {
          if (artifact.steps?.length) append(contentBody, el('div', { style:'margin-top:20px' }));
          append(contentBody, el('span', { className:'label-text', textContent:`Checklist — ${artifact.checklist.length} items` }));
          const clList = el('div', { className:'checklist-list' });
          for (const item of artifact.checklist) {
            const sev = (item.severity || 'medium').toLowerCase();
            const clEl = el('div', { className:`checklist-item sev-${sev}` });
            append(clEl,
              el('span', { className:`severity-pill pill-${sev}`, textContent:(item.severity || 'medium').toUpperCase() }),
              el('p',    { className:'checklist-text',      textContent: item.item || '' }),
              item.rationale ? el('p', { className:'checklist-rationale', textContent: item.rationale }) : null,
            );
            clList.appendChild(clEl);
          }
          contentBody.appendChild(clList);
        }
      }
      contentCard.appendChild(contentBody);
      pc.appendChild(contentCard);

      // ── Parents ───────────────────────────────────────────────────────────
      if (kb.parents?.length) {
        const parCard = el('div', { className:'section-card' });
        append(parCard, append(el('div', { className:'section-header' }),
          el('span', { className:'section-title', textContent:'Parent KBs' }),
          el('span', { className:'section-count', textContent: String(kb.parents.length) }),
        ));
        const parBody = el('div', { className:'section-body' });
        const parGrid = el('div', { className:'parents-grid' });
        for (const p of kb.parents) {
          const card = el('div', { className:'parent-card' });
          append(card,
            el('p', { className:'parent-hash', textContent: trunc(p.parentHash, 10, 8) }),
            el('p', { className:'parent-royalty', textContent: `${p.royaltyShareBps ?? 0} bps royalty share` }),
          );
          if (p.parentHash) {
            const link = el('a', { className:'parent-link', href:`/kb-detail?hash=${encodeURIComponent(p.parentHash)}`, textContent:'View KB →' });
            card.appendChild(link);
          }
          parGrid.appendChild(card);
        }
        parBody.appendChild(parGrid);
        parCard.appendChild(parBody);
        pc.appendChild(parCard);
      }

      // ── On-chain provenance ───────────────────────────────────────────────
      const provCard = el('div', { className:'section-card' });
      append(provCard, append(el('div', { className:'section-header' }),
        el('span', { className:'section-title', textContent:'On-Chain Provenance' }),
      ));
      const provBody = el('div', { className:'section-body' });
      const tbl = el('table', { className:'prov-table' });

      function pRow(label, value, mono) {
        const tr = document.createElement('tr');
        append(tr,
          el('td', { className:'prov-key', textContent: label }),
          el('td', { className: mono ? 'prov-val-mono' : 'prov-val', textContent: String(value ?? '—') }),
        );
        return tr;
      }

      append(tbl,
        pRow('Content Hash', kb.contentHash, true),
        pRow('IPFS CID',     kb.cid || '—', true),
        kb.curator ? pRow('Curator', kb.curator, true) : null,
        kb.creator ? pRow('Creator', kb.creator, true) : null,
        pRow('Block',       kb.blockNumber ? Number(kb.blockNumber).toLocaleString() : '—'),
        kb.timestamp ? pRow('Published', new Date(Number(kb.timestamp)*1000).toUTCString()) : null,
        pRow('Transaction', kb.transactionHash ? trunc(kb.transactionHash,14,10) : '—', true),
        pRow('Query Fee',   kb.queryFee ? `${weiToEth(kb.queryFee)} ETH` : '—'),
        pRow('Stake',       kb.stakeAmount ? `${weiToEth(kb.stakeAmount)} ETH` : '0 ETH'),
        pRow('Slashed',     kb.isSlashed ? 'Yes' : 'No'),
      );
      provBody.appendChild(tbl);
      provCard.appendChild(provBody);
      pc.appendChild(provCard);

      // ── Usage stats ───────────────────────────────────────────────────────
      const statCard = el('div', { className:'section-card' });
      append(statCard, append(el('div', { className:'section-header' }),
        el('span', { className:'section-title', textContent:'Usage & Economics' }),
      ));
      const statsGrid = el('div', { className:'stats-grid' });
      function statBox(num, desc) {
        return append(el('div', { className:'stat-box' }),
          el('div', { className:'stat-number', textContent: String(num) }),
          el('div', { className:'stat-desc',   textContent: desc }),
        );
      }
      append(statsGrid,
        statBox(kb.queryVolume ?? 0,                            'Query Volume'),
        statBox(kb.settlementCount ?? 0,                        'Settlements'),
        statBox(`${weiToEth(kb.totalSettledValue)} ETH`,        'Total Earned'),
        statBox(kb.uniquePayerCount ?? 0,                       'Unique Payers'),
        statBox(kb.endorsementCount ?? 0,                       'Endorsements'),
        statBox(`${kb.reputationScore ?? 0}/1000`,              'Reputation'),
      );
      statCard.appendChild(statsGrid);
      pc.appendChild(statCard);
    }

    function renderError(msg) {
      const pc = document.getElementById('page-content');
      clearEl(pc);
      append(pc,
        append(el('div', { className:'state-card' }),
          el('span', { className:'state-icon', textContent:'⚠️' }),
          el('p',    { className:'state-title', textContent:'Could not load KB' }),
          el('p',    { className:'state-sub',   textContent: String(msg) }),
        ),
      );
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    const hash = new URLSearchParams(window.location.search).get('hash');
    if (!hash) {
      renderError('No KB hash provided. Use ?hash=0x… in the URL.');
    } else {
      (async () => {
        try {
          const kb       = await fetchKB(hash);
          const artifact = kb.cid ? await fetchArtifact(kb.cid) : null;
          renderPage(kb, artifact);
        } catch (e) {
          renderError(e.message);
        }
      })();
    }
  </script>
</body>
</html>
